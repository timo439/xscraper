<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  font-family: 'Inter', sans-serif;
  color: #fff;
}
h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 32px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 40px;
  flex-wrap: wrap;
  justify-content: center;
}
button {
  background: #fff;
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 12px 28px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.secondary {
  background: #222;
  color: #fff;
}
.status-bar {
  font-size: 13px;
  color: #888;
  margin-bottom: 32px;
  min-height: 20px;
  text-align: center;
}
.status-bar.error { color: #ff6b6b; }
.status-bar.success { color: #6bffb8; }
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid #444;
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Instagram post header above phone ── */
.post-header {
  width: 390px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  padding: 0 2px;
}
.avatar-ring {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  padding: 2px;
  flex-shrink: 0;
}
.avatar-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: #111;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
}
.post-meta { flex: 1; }
.post-handle { font-size: 13px; font-weight: 600; color: #fff; }
.post-time { font-size: 11px; color: #8e8e8e; }
.post-more { font-size: 20px; color: #fff; letter-spacing: 1px; line-height: 1; }

/* ── iPhone shell ── */
.phone {
  width: 390px;
  background: #000;
  border-radius: 50px;
  box-shadow:
    0 0 0 10px #1a1a1a,
    0 0 0 11px #3a3a3a,
    0 30px 80px rgba(0,0,0,0.7),
    0 10px 30px rgba(0,0,0,0.4);
  overflow: hidden;
  position: relative;
}
.island {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  width: 126px; height: 37px;
  background: #000;
  border-radius: 20px;
  z-index: 20;
}
.status-bar-phone {
  height: 59px;
  background: #000;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 8px;
  position: relative;
  z-index: 5;
}
.status-time { font-size: 15px; font-weight: 600; color: #fff; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width:16px; height:16px; }
.ig-nav {
  background: #000;
  border-bottom: 1px solid #222;
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ig-nav-handle { font-size: 15px; font-weight: 700; color: #fff; }
.ig-nav-icons { display: flex; gap: 18px; align-items: center; }
.ig-nav-icons svg { width:24px; height:24px; }
.ig-post-head {
  background: #000;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 9px;
}
.ig-post-av {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  padding: 2px;
  flex-shrink: 0;
}
.ig-post-av-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.ig-post-info { flex:1; }
.ig-post-name { font-size: 13px; font-weight: 600; color: #fff; line-height:1.2; }
.ig-post-loc { font-size: 11px; color: #8e8e8e; }
.ig-post-dots { font-size: 18px; color: #fff; line-height:1; display:flex; align-items:center; }
.card {
  position: relative;
  width: 390px;
  height: 487px;
  overflow: hidden;
}
.card-bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-text-area {
  position: absolute;
  top: 50%;
  transform: translateY(-56%);
  left: 32px; right: 32px;
}
.card-title {
  font-family: 'PT Serif', serif;
  font-weight: 400;
  font-size: 22px;
  line-height: 1.35;
  color: #1a1a1a;
  letter-spacing: -0.2px;
}
.card-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(26,26,26,0.3);
  font-size: 13px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
}
.card-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 32px 24px;
}
.card-footer-line {
  border-top: 1px solid #1a1a1a;
  margin-bottom: 9px;
}
.card-footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-book {
  font-family: 'PT Serif', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 11px;
  color: #1a1a1a;
}
.footer-handle {
  font-family: 'PT Serif', serif;
  font-weight: 400;
  font-size: 11px;
  color: #1a1a1a;
}
.ig-actions {
  background: #000;
  padding: 10px 12px 4px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.ig-actions svg { width:24px; height:24px; }
.bm { margin-left: auto; }
.ig-likes { background:#000; padding:2px 12px 3px; font-size:13px; font-weight:600; color:#fff; }
.ig-caption { background:#000; padding:2px 12px 14px; font-size:13px; color:#fff; line-height:1.45; }
.ig-caption b { font-weight:600; }
.ig-caption .dim { color:#8e8e8e; }
.ig-comment-bar {
  background: #000;
  border-top: 1px solid #222;
  padding: 10px 12px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ig-comment-av { width:28px; height:28px; border-radius:50%; background:#222; flex-shrink:0; }
.ig-comment-input { flex:1; font-size:13px; color:#8e8e8e; }
.ig-comment-emoji { font-size:18px; display:flex; gap:8px; }
.phone-home {
  background: #000;
  padding: 10px 0 8px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid #222;
}
.phone-home svg { width:25px; height:25px; }
.home-bar { background:#000; height:34px; display:flex; align-items:center; justify-content:center; }
.home-indicator { width:134px; height:5px; background:#555; border-radius:3px; }

.meta {
  margin-top: 24px;
  font-size: 11px;
  color: #555;
  text-align: center;
  max-width: 390px;
}
</style>

<script>
function setStatus(msg, type = '') {
  const el = document.getElementById('statusBar');
  el.innerHTML = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

function setGenerating(active) {
  document.getElementById('generateBtn').disabled = active;
  document.getElementById('downloadBtn').disabled = active;
}

async function startGenerate() {
  setGenerating(true);
  setStatus('<span class="spinner"></span>Scraping @orangebook_ & @naval for top tweets — takes ~30 seconds...');
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('cardTitle').style.display = 'none';
  document.getElementById('sourceMeta').textContent = '';

  try {
    const res  = await fetch('/api/scrape', { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderQuote(data);
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
    setGenerating(false);
  }
}

function renderQuote(data) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('cardTitle').style.display = 'block';
  document.getElementById('cardTitle').textContent = data.text;
  document.getElementById('igLikes').textContent   = Math.floor(Math.random() * 15000 + 5000).toLocaleString() + ' likes';
  document.getElementById('igCaption').textContent = data.text.substring(0, 60) + '...';
  document.getElementById('sourceMeta').textContent =
    'Source: ' + (data.retweets > 0 ? data.retweets.toLocaleString() + ' retweets' : 'scraped tweet');
  setStatus('Quote generated ✓', 'success');
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('generateBtn').disabled = false;
}

function downloadCard() {
  const text = document.getElementById('cardTitle').textContent;
  if (!text) return;
  const slug = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').substring(0, 30);
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'timarmoo-quote-' + slug + '.html';
  a.click();
}
</script>
